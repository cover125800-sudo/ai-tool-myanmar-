<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>AI Tool Myanmar</title>

  <meta
    name="description"
    content="AI Tool Myanmar - Smart AI Assistant powered by Groq API">

  <meta
    name="theme-color"
    content="#0F172A">

  <!-- Open Graph -->

  <meta
    property="og:title"
    content="AI Tool Myanmar">

  <meta
    property="og:description"
    content="Modern AI Chat powered by Groq">

  <meta
    property="og:image"
    content="assets/preview.png">

  <!-- Favicon -->

  <link
    rel="icon"
    href="assets/favicon.ico">

  <!-- Google Fonts -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Myanmar:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Markdown -->

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Highlight.js -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Main CSS -->

  <link
    rel="stylesheet"
    href="css/style.css">

</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="logo">
      🤖
      <h2>AI Tool Myanmar</h2>
    </div>

    <button id="newChatBtn" class="new-chat-btn">
      + New Chat
    </button>

    <div id="historyList" class="history-list">
      <!-- Chat History -->
    </div>

    <div class="sidebar-footer">
      <button id="themeBtn">🌙 Theme</button>
      <button id="settingsBtn">⚙️ Settings</button>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Header -->
    <header class="topbar">

      <div class="title">
        AI Tool Myanmar
      </div>

      <button id="clearChatBtn">
        🗑 Clear Chat
      </button>

    </header>

    <!-- Chat Area -->
    <section id="chat" class="chat">

      <!-- AI Message တွေ ဒီမှာပေါ်မယ် -->

    </section>
    <footer class="input-area">

      <button id="attachBtn" class="icon-btn">📎</button>

      <button
        id="micBtn"
        class="icon-btn"
        onclick="startVoice()">
        🎤
      </button>

      <textarea
        id="prompt"
        rows="1"
        placeholder="Ask anything..."></textarea>

      <button
        id="sendBtn"
        class="send-btn"
        onclick="sendMessage()">
        ➤
      </button>

    </footer>

  </main>

</div>

<script src="js/script.js"></script>

</body>
</html>
