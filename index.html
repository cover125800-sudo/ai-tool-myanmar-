<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tool Myanmar</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.header{
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    background:#111827;
}

#chat{
    height:70vh;
    overflow-y:auto;
    padding:10px;
}

.msg{
    padding:10px 15px;
    margin:10px;
    border-radius:12px;
    max-width:80%;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.ai{
    background:#1f2937;
    margin-right:auto;
}

.inputBox{
    display:flex;
    padding:10px;
    background:#111827;
}

textarea{
    flex:1;
    resize:none;
    height:50px;
    border:none;
    border-radius:8px;
    padding:10px;
}

button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🤖 AI Tool Myanmar</div>

<button onclick="clearChat()" id="clearBtn">🗑️ Clear Chat</button>
<div id="chat"></div>

<div class="inputBox">
    <textarea id="prompt" placeholder="မေးချင်တာရေးပါ..."></textarea>
    <button onclick="sendMessage()" onkeydown="if(event.key==='Enter') sendMessage()">Send</button>
</div>

<script>
async function sendMessage(){
    const promptBox = document.getElementById("prompt");
    const chat = document.getElementById("chat");

    const message = promptBox.value.trim();
    if(!message) return;

    // user msg
    chat.innerHTML += `<div class="msg user">${message}</div>`;
    promptBox.value = "";

    // loading
    const loading = document.createElement("div");
    loading.className = "msg ai";
    loading.innerText = "🤖 ...";
    chat.appendChild(loading);

    chat.scrollTop = chat.scrollHeight;

    try{
        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ prompt:message })
        });

        const data = await res.json();

        loading.remove();

        chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
        chat.scrollTop = chat.scrollHeight;

    }catch(err){
        loading.remove();
        chat.innerHTML += `<div class="msg ai">❌ Error: ${err.message}</div>`;
    }
}
</script>

</body>
</html>
