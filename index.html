<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tool Myanmar</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
    text-align:center;
}

h1{
    color:#2563eb;
}

textarea{
    width:90%;
    max-width:600px;
    height:120px;
    padding:10px;
    font-size:16px;
}

button{
    margin-top:10px;
    padding:12px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

#chat{
    max-width:700px;
    margin:20px auto;
    text-align:left;
}

.user{
    background:#2563eb;
    color:white;
    padding:12px;
    border-radius:15px 15px 0 15px;
    margin:10px 0;
}

.ai{
    background:#f1f5f9;
    color:#111;
    padding:12px;
    border-radius:15px 15px 15px 0;
    margin:10px 0;
}

</style>
</head>

<body>

<h1>🤖 AI Tool Myanmar</h1>

<div id="chat"></div>

<textarea id="prompt" placeholder="မေးချင်တာ ရိုက်ပါ..."></textarea>
<br>
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
    const promptBox = document.getElementById("prompt");
    const chat = document.getElementById("chat");

    const message = promptBox.value;
    if (!message) return;

    // user message
    chat.innerHTML += `<div class="user">👤 ${message}</div>`;
    promptBox.value = "";

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt: message })
        });

        const data = await res.json();

        // AI reply
        chat.innerHTML += `<div class="ai">🤖 ${data.reply}</div>`;
    }
    catch (err) {
        chat.innerHTML += `<div class="ai">❌ Error: ${err.message}</div>`;
    }
}
</script>

</body>
</html>
